<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="images/dez-favicon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio — Dez's Skyline Photography</title>
  <meta name="description" content="Fine art photography portfolio by Desiree James. Cityscapes, jazz musicians, historic landmarks, and soul photography." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root { --navy: #12123a; --navy-deep: #0a0a28; --navy-mid: #1a1a4e; --magenta: #e91e8c; --magenta-light: #f050a8; --gold: #f5c518; --white: #ffffff; --text-muted: rgba(255,255,255,0.55); --ease-spring: cubic-bezier(0.32, 0.72, 0, 1); --ease-out: cubic-bezier(0.16, 1, 0.3, 1); }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { background-color: var(--navy-deep); color: var(--white); font-family: 'DM Sans', sans-serif; font-weight: 300; overflow-x: hidden; }
    body::before { content: ''; position: fixed; inset: 0; z-index: 100; pointer-events: none; opacity: 0.025; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E"); background-repeat: repeat; }

    nav { position: fixed; top: 1.5rem; left: 50%; transform: translateX(-50%); z-index: 90; display: flex; align-items: center; background: rgba(18, 18, 58, 0.7); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 1px solid rgba(233, 30, 140, 0.25); border-radius: 100px; padding: 0.5rem 0.5rem 0.5rem 1.5rem; white-space: nowrap; }
    .nav-logo { font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 700; color: var(--white); text-decoration: none; margin-right: 2rem; }
    .nav-logo span { color: var(--magenta); }
    .nav-links { display: flex; gap: 0.25rem; list-style: none; }
    .nav-links a { font-size: 0.8rem; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(255,255,255,0.7); text-decoration: none; padding: 0.5rem 0.9rem; border-radius: 100px; transition: all 500ms var(--ease-spring); }
    .nav-links a:hover, .nav-links a.active { color: var(--white); background: rgba(233, 30, 140, 0.2); }
    .nav-cta { font-size: 0.8rem !important; font-weight: 500 !important; text-transform: uppercase !important; color: var(--navy-deep) !important; background: var(--magenta) !important; padding: 0.6rem 1.2rem !important; border-radius: 100px !important; margin-left: 0.5rem; }
    .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 0.5rem; border: none; background: transparent; }
    .hamburger span { display: block; width: 22px; height: 2px; background: var(--white); border-radius: 2px; transition: all 400ms var(--ease-spring); transform-origin: center; }
    .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
    .mobile-menu { display: none; position: fixed; inset: 0; z-index: 85; background: rgba(10,10,40,0.96); backdrop-filter: blur(24px); flex-direction: column; align-items: center; justify-content: center; gap: 2rem; }
    .mobile-menu.open { display: flex; }
    .mobile-menu a { font-family: 'Playfair Display', serif; font-size: 2.5rem; font-weight: 700; color: var(--white); text-decoration: none; transition: color 300ms; }
    .mobile-menu a:hover { color: var(--magenta); }

    .page-hero { min-height: 45dvh; display: flex; align-items: flex-end; padding: 10rem 2rem 4rem; background: linear-gradient(160deg, var(--navy-deep) 0%, #0a0a1a 100%); position: relative; overflow: hidden; }
    .page-hero::before { content: ''; position: absolute; width: 700px; height: 700px; border-radius: 50%; background: radial-gradient(circle, rgba(233,30,140,0.08), transparent 70%); left: -150px; top: -200px; }
    .page-hero-inner { max-width: 1200px; margin: 0 auto; width: 100%; position: relative; z-index: 2; }
    .page-eyebrow { display: inline-flex; align-items: center; gap: 0.5rem; background: rgba(233, 30, 140, 0.12); border: 1px solid rgba(233, 30, 140, 0.3); border-radius: 100px; padding: 0.35rem 1rem; font-size: 0.7rem; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase; color: var(--magenta-light); margin-bottom: 1.5rem; }
    .page-title { font-family: 'Playfair Display', serif; font-size: clamp(3rem, 8vw, 6rem); font-weight: 900; line-height: 0.95; letter-spacing: -0.03em; }
    .page-title em { font-style: italic; color: var(--magenta); }

    section { padding: 6rem 2rem; }
    .section-inner { max-width: 1300px; margin: 0 auto; }

    .filter-bar { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 3rem; }
    .filter-btn { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); border-radius: 100px; padding: 0.55rem 1.25rem; font-size: 0.78rem; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(255,255,255,0.6); cursor: pointer; transition: all 400ms var(--ease-spring); }
    .filter-btn:hover, .filter-btn.active { background: rgba(233,30,140,0.15); border-color: rgba(233,30,140,0.4); color: var(--white); }

    /* Masonry-ish gallery */
    .gallery-masonry { columns: 3; column-gap: 1rem; }
    .masonry-item { break-inside: avoid; margin-bottom: 1rem; position: relative; border-radius: 1rem; overflow: hidden; cursor: pointer; }
    .masonry-item img { width: 100%; display: block; transition: transform 700ms var(--ease-spring); }
    .masonry-item:hover img { transform: scale(1.04); }
    .masonry-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(10,10,40,0.9) 0%, transparent 55%); opacity: 0; transition: opacity 400ms var(--ease-out); display: flex; align-items: flex-end; padding: 1.25rem; }
    .masonry-item:hover .masonry-overlay { opacity: 1; }
    .masonry-info { width: 100%; }
    .masonry-title { font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 700; margin-bottom: 0.2rem; }
    .masonry-cat { font-size: 0.68rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--magenta-light); }
    .masonry-actions { display: flex; gap: 0.5rem; margin-top: 0.75rem; }
    .masonry-btn { font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; padding: 0.4rem 0.85rem; border-radius: 100px; border: none; cursor: pointer; transition: all 300ms; }
    .masonry-btn-view { background: rgba(255,255,255,0.1); color: white; }
    .masonry-btn-order { background: var(--magenta); color: white; }
    .masonry-btn:hover { opacity: 0.85; }

    /* Lightbox */
    .lightbox { position: fixed; inset: 0; z-index: 200; background: rgba(5,5,20,0.97); display: none; align-items: center; justify-content: center; padding: 2rem; }
    .lightbox.open { display: flex; }
    .lightbox img { max-width: 90vw; max-height: 85dvh; object-fit: contain; border-radius: 0.5rem; }
    .lightbox-close { position: fixed; top: 2rem; right: 2rem; background: rgba(255,255,255,0.1); border: none; width: 48px; height: 48px; border-radius: 50%; color: white; font-size: 1.4rem; cursor: pointer; transition: background 300ms; display: flex; align-items: center; justify-content: center; }
    .lightbox-close:hover { background: var(--magenta); }
    .lightbox-caption { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); text-align: center; }
    .lightbox-caption h3 { font-family: 'Playfair Display', serif; font-size: 1.2rem; font-weight: 700; margin-bottom: 0.25rem; }
    .lightbox-caption p { font-size: 0.8rem; color: var(--text-muted); }

    footer { background: var(--navy-deep); border-top: 1px solid rgba(255,255,255,0.05); padding: 3rem 2rem; }
    .footer-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1.5rem; }
    .footer-logo { font-family: 'Playfair Display', serif; font-size: 1.3rem; font-weight: 700; color: var(--white); text-decoration: none; }
    .footer-logo span { color: var(--magenta); }
    .footer-copy { font-size: 0.8rem; color: var(--text-muted); }
    .footer-socials { display: flex; gap: 0.75rem; }
    .social-pill { display: flex; align-items: center; gap: 0.4rem; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); border-radius: 100px; padding: 0.45rem 0.9rem; font-size: 0.78rem; color: rgba(255,255,255,0.7); text-decoration: none; transition: all 400ms; }
    .social-pill:hover { background: rgba(233,30,140,0.15); border-color: rgba(233,30,140,0.3); color: white; }

    @media (max-width: 900px) { .gallery-masonry { columns: 2; } }
    @media (max-width: 768px) {
      section { padding: 5rem 1.25rem; }
      nav { padding: 0.5rem 0.5rem 0.5rem 1.25rem; width: calc(100% - 2rem); }
      .nav-links, .nav-cta { display: none; }
      .hamburger { display: flex; }
      .footer-inner { flex-direction: column; text-align: center; }
    }
    @media (max-width: 480px) { .gallery-masonry { columns: 1; } }
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="nav-logo">Dez's <span>Skyline</span></a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="portfolio.html" class="active">Portfolio</a></li>
      <li><a href="shop.html">Shop</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
    <a href="shop.html" class="nav-links nav-cta">Shop Prints</a>
    <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
  </nav>
  <div class="mobile-menu" id="mobileMenu">
    <a href="index.html">Home</a><a href="about.html">About</a><a href="portfolio.html">Portfolio</a><a href="shop.html">Shop</a><a href="contact.html">Contact</a>
  </div>

  <div class="page-hero">
    <div class="page-hero-inner">
      <div class="page-eyebrow">Photography Portfolio</div>
      <h1 class="page-title">The <em>Gallery</em></h1>
    </div>
  </div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lightboxClose">✕</button>
    <img id="lightboxImg" src="" alt="" />
    <div class="lightbox-caption">
      <h3 id="lightboxTitle"></h3>
      <p id="lightboxCat"></p>
    </div>
  </div>

  <section>
    <div class="section-inner">
      <div class="filter-bar">
        <button class="filter-btn active" data-filter="all">All Work</button>
        <button class="filter-btn" data-filter="cityscape">Cityscape</button>
        <button class="filter-btn" data-filter="jazz">Jazz & Music</button>
        <button class="filter-btn" data-filter="historic">Historic</button>
        <button class="filter-btn" data-filter="bw">Black & White</button>
      </div>
      <div class="gallery-masonry" id="galleryMasonry"></div>
    </div>
  </section>

  <footer>
    <div class="footer-inner">
      <a href="index.html" class="footer-logo">Dez's <span>Skyline</span></a>
      <p class="footer-copy">© 2026 Dez's Skyline. All rights reserved. · Designed by <a href="https://moorgraphix.com" target="_blank" style="color:var(--magenta);text-decoration:none;">Moor Graphix</a></p>
      <div class="footer-socials">
        <a href="https://www.facebook.com/desiree.d.james" target="_blank" class="social-pill">f Facebook</a>
        <a href="https://www.instagram.com/dezisky22/" target="_blank" class="social-pill">◎ Instagram</a>
        <a href="https://www.youtube.com/channel/UCojfNzP__pvOM0Yyw_Fop-A" target="_blank" class="social-pill">▶ YouTube</a>
      </div>
    </div>
  </footer>

  <script>
    const photos = [
      { title:'ATL Reflections', cat:'cityscape', img:'https://dezsskyline.com/wp-content/uploads/2020/08/ATL-Reflections-tn.jpg' },
      { title:'Pharoah Sanders', cat:'jazz', img:'https://dezsskyline.com/wp-content/uploads/2021/10/Pharoah-Sanders.jpg' },
      { title:'Pettus Bridge', cat:'historic', img:'https://dezsskyline.com/wp-content/uploads/2020/08/Pettus-2-tn.jpg' },
      { title:'ATL Reflections B&W', cat:'bw', img:'https://dezsskyline.com/wp-content/uploads/2020/08/ATL-Reflections-BW-tn.jpg' },
      { title:'Boney James', cat:'jazz', img:'https://dezsskyline.com/wp-content/uploads/2021/10/Boney-James-3-e1635016717460.jpg' },
      { title:'NYC BrickHouse', cat:'cityscape', img:'https://dezsskyline.com/wp-content/uploads/2020/08/NYC-BrickHouse-tn.jpg' },
      { title:'Oculus 9/11 Memorial', cat:'historic', img:'https://dezsskyline.com/wp-content/uploads/2020/08/Oculus-911-Memorial-tn.jpg' },
      { title:'Najee', cat:'jazz', img:'https://dezsskyline.com/wp-content/uploads/2021/10/Najee-3.jpg' },
      { title:'Brooklyn Bridge', cat:'cityscape', img:'https://dezsskyline.com/wp-content/uploads/2020/08/BrooklynBridge-tn.jpg' },
      { title:'Paul Taylor', cat:'jazz', img:'https://dezsskyline.com/wp-content/uploads/2021/10/Paul-Taylor-3.jpg' },
      { title:'The Apollo', cat:'historic', img:'https://dezsskyline.com/wp-content/uploads/2020/08/Apollo-tn.jpg' },
      { title:'Michael Lington', cat:'jazz', img:'https://dezsskyline.com/wp-content/uploads/2021/10/Michael-Lington-2.jpg' },
      { title:'30-A Panama City', cat:'cityscape', img:'https://dezsskyline.com/wp-content/uploads/2020/08/30-A-Pamana-City-tn.jpg' },
      { title:'Mayse', cat:'jazz', img:'https://dezsskyline.com/wp-content/uploads/2021/10/Mayse-3.jpg' },
      { title:'78 East', cat:'cityscape', img:'https://dezsskyline.com/wp-content/uploads/2020/08/78-East-tn-scaled.jpg' },
      { title:'DSC 0531', cat:'cityscape', img:'https://dezsskyline.com/wp-content/uploads/2021/11/DSC_0531-tn.jpg' },
      { title:'Croog Street', cat:'cityscape', img:'https://dezsskyline.com/wp-content/uploads/2020/08/Croog-Street-Vive-tn.jpg' },
      { title:'West Side Story', cat:'historic', img:'https://dezsskyline.com/wp-content/uploads/2020/08/West-Side_Story-tn.jpg' },
      { title:'830AM Pandemic ATL', cat:'bw', img:'https://dezsskyline.com/wp-content/uploads/2020/08/830AM-Pandemic-ATL-tn.jpg' },
      { title:'Bloody Sunday', cat:'historic', img:'https://dezsskyline.com/wp-content/uploads/2020/08/Bloody_Sunday-1-tn.jpg' },
    ];

    let activeFilter = 'all';
    const masonry = document.getElementById('galleryMasonry');

    function renderGallery() {
      const filtered = activeFilter === 'all' ? photos : photos.filter(p => p.cat === activeFilter);
      masonry.innerHTML = '';
      filtered.forEach(p => {
        const item = document.createElement('div');
        item.className = 'masonry-item';
        item.innerHTML = `
          <img src="${p.img}" alt="${p.title}" loading="lazy" />
          <div class="masonry-overlay">
            <div class="masonry-info">
              <div class="masonry-title">${p.title}</div>
              <div class="masonry-cat">${p.cat}</div>
              <div class="masonry-actions">
                <button class="masonry-btn masonry-btn-view" onclick='openLightbox(${JSON.stringify(p)})'>View Full</button>
                <button class="masonry-btn masonry-btn-order" onclick="window.location='shop.html'">Order Print</button>
              </div>
            </div>
          </div>`;
        masonry.appendChild(item);
      });
    }

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeFilter = btn.dataset.filter;
        renderGallery();
      });
    });

    function openLightbox(photo) {
      document.getElementById('lightboxImg').src = photo.img;
      document.getElementById('lightboxImg').alt = photo.title;
      document.getElementById('lightboxTitle').textContent = photo.title;
      document.getElementById('lightboxCat').textContent = photo.cat;
      document.getElementById('lightbox').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    document.getElementById('lightboxClose').addEventListener('click', () => {
      document.getElementById('lightbox').classList.remove('open');
      document.body.style.overflow = '';
    });

    document.getElementById('lightbox').addEventListener('click', (e) => {
      if (e.target === document.getElementById('lightbox')) {
        document.getElementById('lightbox').classList.remove('open');
        document.body.style.overflow = '';
      }
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') { document.getElementById('lightbox').classList.remove('open'); document.body.style.overflow = ''; }
    });

    const hamburger = document.getElementById('hamburger');
    const mobileMenu = document.getElementById('mobileMenu');
    hamburger.addEventListener('click', () => { hamburger.classList.toggle('open'); mobileMenu.classList.toggle('open'); });
    mobileMenu.querySelectorAll('a').forEach(a => a.addEventListener('click', () => { hamburger.classList.remove('open'); mobileMenu.classList.remove('open'); }));

    renderGallery();
  </script>
</body>
</html>
